<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expense & Savings Tracker</title>
    <!-- We are importing a free tool called Chart.js to draw the circle chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #334155;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h2 { margin-top: 0; font-size: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #94a3b8; }
        input, select {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #2563eb; }
        .expense-item {
            display: flex;
            justify-content: space-between;
            background: #0f172a;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 4px solid var(--primary);
        }
        .delete-btn {
            background: var(--danger);
            padding: 5px 10px;
            width: auto;
            margin: 0;
        }
        .suggestion-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--primary);
            padding: 15px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.5;
        }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center;">📊 My Smart Expense Tracker</h1>

    <!-- Setup Section -->
    <div class="card">
        <h2>1. Monthly Setup</h2>
        <div class="grid-2">
            <div>
                <label>Monthly Income ($)</label>
                <input type="number" id="income" oninput="updateDashboard()" placeholder="e.g. 3000">
            </div>
            <div>
                <label>Monthly Savings Goal ($)</label>
                <input type="number" id="goal" oninput="updateDashboard()" placeholder="e.g. 500">
            </div>
        </div>
    </div>

    <!-- Add Expense Section -->
    <div class="card">
        <h2>2. Add Daily Expense</h2>
        <div class="grid-2">
            <div>
                <label>Amount ($)</label>
                <input type="number" id="exp-amount" placeholder="0.00">
            </div>
            <div>
                <label>Category</label>
                <select id="exp-category">
                    <option value="Food">Food & Drinks</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Transport">Transport (Gas/Bus)</option>
                    <option value="Bills">Bills & Utilities</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>
        <label>Description (Optional)</label>
        <input type="text" id="exp-desc" placeholder="e.g. Lunch at McDonald's">
        <button onclick="addExpense()">+ Add Expense</button>
    </div>

    <!-- Smart Suggestion -->
    <div class="card">
        <h2>💡 Smart Savings Tip</h2>
        <div id="suggestion-text" class="suggestion-box">
            Add some expenses to get personalized tips on how to save money!
        </div>
    </div>

    <!-- Chart Section -->
    <div class="card">
        <h2>Pie Chart Breakdown</h2>
        <div class="chart-container">
            <canvas id="expenseChart"></canvas>
        </div>
    </div>

    <!-- History Section -->
    <div class="card">
        <h2>Expense History</h2>
        <div id="expense-list"></div>
    </div>
</div>

<script>
    let expenses = JSON.parse(localStorage.getItem('smart_expenses')) || [];
    let myChart = null;

    // Load setup data
    window.onload = function() {
        document.getElementById('income').value = localStorage.getItem('smart_income') || '';
        document.getElementById('goal').value = localStorage.getItem('smart_goal') || '';
        updateDashboard();
    };

    function addExpense() {
        const amount = parseFloat(document.getElementById('exp-amount').value);
        const category = document.getElementById('exp-category').value;
        const desc = document.getElementById('exp-desc').value || category;

        if (!amount || amount <= 0) {
            alert("Please enter a valid amount!");
            return;
        }

        const expense = { id: Date.now(), amount, category, desc };
        expenses.push(expense);
        
        document.getElementById('exp-amount').value = '';
        document.getElementById('exp-desc').value = '';
        
        updateDashboard();
    }

    function deleteExpense(id) {
        expenses = expenses.filter(exp => exp.id !== id);
        updateDashboard();
    }

    function updateDashboard() {
        // Save to local storage
        localStorage.setItem('smart_expenses', JSON.stringify(expenses));
        localStorage.setItem('smart_income', document.getElementById('income').value);
        localStorage.setItem('smart_goal', document.getElementById('goal').value);

        // Group expenses by category
        const categoryTotals = {};
        let totalSpent = 0;
        
        expenses.forEach(exp => {
            if (!categoryTotals[exp.category]) categoryTotals[exp.category] = 0;
            categoryTotals[exp.category] += exp.amount;
            totalSpent += exp.amount;
        });

        updateChart(categoryTotals);
        updateHistory();
        generateSmartSuggestion(categoryTotals, totalSpent);
    }

    function generateSmartSuggestion(categoryTotals, totalSpent) {
        const suggestionBox = document.getElementById('suggestion-text');
        const goal = parseFloat(document.getElementById('goal').value) || 0;
        const income = parseFloat(document.getElementById('income').value) || 0;

        if (expenses.length === 0) {
            suggestionBox.innerHTML = "Add some expenses to get personalized tips!";
            return;
        }

        // Find highest spending category
        let maxCategory = '';
        let maxAmount = 0;
        for (const [cat, amt] of Object.entries(categoryTotals)) {
            if (amt > maxAmount) {
                maxAmount = amt;
                maxCategory = cat;
            }
        }

        const percentOfTotal = Math.round((maxAmount / totalSpent) * 100);
        let tip = `Right now, your biggest expense is <strong>${maxCategory}</strong>, taking up <strong>${percentOfTotal}%</strong> of your total spending ($${maxAmount.toFixed(2)}). <br><br>`;

        // Custom tips based on category
        if (maxCategory === 'Food') {
            tip += "🍔 <strong>Tip to reach your goal:</strong> Try meal-prepping for 3 days a week instead of eating out, or limit your coffee shop visits. It's the easiest category to cut down!";
        } else if (maxCategory === 'Shopping') {
            tip += "🛍️ <strong>Tip to reach your goal:</strong> Try the '48-hour rule'. If you want to buy something online, leave it in your cart for 48 hours. Usually, the urge passes and you save the money!";
        } else if (maxCategory === 'Entertainment') {
            tip += "🎮 <strong>Tip to reach your goal:</strong> Check your subscriptions. Are you paying for Netflix, Spotify, or games you aren't using daily? Cancel one for a month and put that money toward your savings goal.";
        } else if (maxCategory === 'Transport') {
            tip += "🚗 <strong>Tip to reach your goal:</strong> Try to bundle your errands so you drive less, or see if public transport/carpooling works for you once a week.";
        } else {
            tip += "💡 <strong>Tip to reach your goal:</strong> Since this is your highest cost, look for one small thing you can cut out from this category to help hit your $" + goal + " savings goal.";
        }

        // Warning if they are failing their goal
        const leftOver = income - totalSpent;
        if (income > 0 && goal > 0 && leftOver < goal) {
            tip = `<strong style="color:#ef4444;">⚠️ Warning: You only have $${leftOver.toFixed(2)} left, but your savings goal is $${goal}.</strong> You need to stop spending to hit your target!<br><br>` + tip;
        }

        suggestionBox.innerHTML = tip;
    }

    function updateChart(categoryTotals) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        
        const labels = Object.keys(categoryTotals);
        const data = Object.values(categoryTotals);
        
        if (myChart) myChart.destroy(); // destroy old chart before drawing new one

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: ['#f87171', '#3b82f6', '#fbbf24', '#34d399', '#a78bfa', '#94a3b8'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#f8fafc' } }
                }
            }
        });
    }

    function updateHistory() {
        const list = document.getElementById('expense-list');
        list.innerHTML = '';
        
        // Show newest first
        const reversedExpenses = [...expenses].reverse();

        reversedExpenses.forEach(exp => {
            list.innerHTML += `
                <div class="expense-item">
                    <div>
                        <strong style="color:var(--primary)">${exp.category}</strong> - ${exp.desc}<br>
                        <small style="color:#94a3b8">$${exp.amount.toFixed(2)}</small>
                    </div>
                    <button class="delete-btn" onclick="deleteExpense(${exp.id})">X</button>
                </div>
            `;
        });
    }
</script>

</body>
</html>
