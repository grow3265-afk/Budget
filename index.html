<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Budget Tracker</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e1e1e6;
            --primary: #4ade80;
            --danger: #f87171;
            --border: #2e2e35;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin-top: 40px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 24px;
            color: #fff;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #a1a1aa;
        }

        input {
            width: 100%;
            background: #27272a;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .result-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
            margin-top: 8px;
        }

        .value {
            font-weight: bold;
            font-size: 18px;
        }

        .income-val { color: var(--primary); }
        .expense-val { color: var(--danger); }
        .rem-val { font-size: 22px; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>💰 My Personal Budget</h1>
        
        <!-- Inputs -->
        <div class="card">
            <div class="grid">
                <div>
                    <label for="income">Monthly Income ($)</label>
                    <input type="number" id="income" placeholder="0" oninput="calculateBudget()">
                </div>
                <div>
                    <label for="savings-goal">Savings Goal ($)</label>
                    <input type="number" id="savings-goal" placeholder="0" oninput="calculateBudget()">
                </div>
            </div>
            
            <div style="margin-bottom: 16px;">
                <label for="bills">Fixed Bills (Rent, Utilities) ($)</label>
                <input type="number" id="bills" placeholder="0" oninput="calculateBudget()">
            </div>

            <div>
                <label for="spending">Other Expenses (Food, Fun) ($)</label>
                <input type="number" id="spending" placeholder="0" oninput="calculateBudget()">
            </div>
        </div>

        <!-- Summary -->
        <div class="card">
            <div class="result-row">
                <span>Total Expenses:</span>
                <span class="value expense-val" id="total-expenses">$0.00</span>
            </div>
            <div class="result-row">
                <span>Target Savings Achieved:</span>
                <span class="value" id="savings-status">0%</span>
            </div>
            <div class="result-row">
                <span>Remaining Pocket Money:</span>
                <span class="value rem-val" id="remaining">$0.00</span>
            </div>
        </div>
    </div>

    <script>
        // Load saved data when the page opens
        window.onload = function() {
            document.getElementById('income').value = localStorage.getItem('budget_income') || '';
            document.getElementById('savings-goal').value = localStorage.getItem('budget_savings') || '';
            document.getElementById('bills').value = localStorage.getItem('budget_bills') || '';
            document.getElementById('spending').value = localStorage.getItem('budget_spending') || '';
            calculateBudget();
        };

        function calculateBudget() {
            // Get values from inputs
            const income = parseFloat(document.getElementById('income').value) || 0;
            const savingsGoal = parseFloat(document.getElementById('savings-goal').value) || 0;
            const bills = parseFloat(document.getElementById('bills').value) || 0;
            const spending = parseFloat(document.getElementById('spending').value) || 0;

            // Save values so they don't disappear on refresh
            localStorage.setItem('budget_income', document.getElementById('income').value);
            localStorage.setItem('budget_savings', document.getElementById('savings-goal').value);
            localStorage.setItem('budget_bills', document.getElementById('bills').value);
            localStorage.setItem('budget_spending', document.getElementById('spending').value);

            // Calculations
            const totalExpenses = bills + spending;
            const remaining = income - totalExpenses - savingsGoal;
            
            let savingsPercent = 0;
            if (savingsGoal > 0) {
                const availableForSavings = income - totalExpenses;
                savingsPercent = Math.min(100, Math.max(0, (availableForSavings / savingsGoal) * 100));
            } else if (income > totalExpenses) {
                savingsPercent = 100; // No goal set, but they are saving money
            }

            // Update the screen
            document.getElementById('total-expenses').innerText = '$' + totalExpenses.toFixed(2);
            document.getElementById('savings-status').innerText = savingsPercent.toFixed(0) + '%';
            
            const remainingEl = document.getElementById('remaining');
            remainingEl.innerText = '$' + remaining.toFixed(2);
            
            // Color code remaining money
            if (remaining < 0) {
                remainingEl.style.color = '#f87171'; // Red if over budget
            } else {
                remainingEl.style.color = '#4ade80'; // Green if safe
            }
        }
    </script>
</body>
</html>
