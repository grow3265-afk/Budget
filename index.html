<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0f19;
            --bg-card: #151b2b;
            --bg-input: #1f2937;
            --bg-hover: #374151;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --border: #2d3748;
            --sidebar-width: 240px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Mobile Header & Menu Toggle --- */
        .mobile-header {
            display: none;
            background: var(--bg-card);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            align-items: center;
            justify-content: space-between;
        }
        .menu-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 40;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            z-index: 50;
            transition: transform 0.3s ease;
        }

        .sidebar h2 {
            padding: 0 20px;
            font-size: 20px;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 30px;
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover { background-color: var(--bg-input); color: var(--text-main); }
        .nav-item.active { background-color: rgba(59, 130, 246, 0.1); color: var(--accent); border-left-color: var(--accent); }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }
        
        .scrollable-area {
            padding: 30px;
            overflow-y: auto;
            flex: 1;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        /* Mobile Adjustments */
        @media (max-width: 768px) { 
            .dashboard-grid { grid-template-columns: 1fr; } 
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .mobile-header { display: flex; }
            .overlay.open { display: block; }
            .scrollable-area { padding: 15px; }
        }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-title { font-size: 16px; font-weight: 600; color: var(--text-muted); margin-top: 0; margin-bottom: 16px; }

        /* --- Forms & Inputs --- */
        label { display: block; font-size: 13px; margin-bottom: 8px; color: var(--text-muted); }
        input {
            width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-main); font-family: 'Inter'; box-sizing: border-box; margin-bottom: 16px;
        }
        input:focus { outline: none; border-color: var(--accent); }

        button {
            padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; transition: 0.2s; width: 100%;
        }
        button:hover { background: var(--accent-hover); }
        .flex-row { display: flex; gap: 10px; margin-bottom: 16px; }

        /* --- Custom Dropdown UI --- */
        .custom-select-wrapper { position: relative; width: 100%; margin-bottom: 16px; }
        .custom-select {
            padding: 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .custom-options {
            position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; margin-top: 5px; z-index: 10; max-height: 200px; overflow-y: auto; display: none;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }
        .custom-options.show { display: block; }
        .custom-option { padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .custom-option:hover { background: var(--bg-hover); }
        .del-cat-btn { color: var(--danger); font-size: 16px; font-weight: bold; cursor: pointer; padding: 0 5px; }
        .del-cat-btn:hover { color: #f87171; }

        /* --- Elements --- */
        .suggestion-box { background: rgba(59, 130, 246, 0.1); border-left: 4px solid var(--accent); padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.5; margin-bottom: 20px;}
        .expense-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg-input); border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--accent); }
        .delete-btn { background: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 5px 10px; width: auto; border-radius: 6px; }
        .date-header { font-size: 14px; font-weight: 600; color: var(--text-muted); margin: 20px 0 10px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; }

        /* --- Calendar --- */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold;}
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-name { font-size: 12px; color: var(--text-muted); padding-bottom: 10px;}
        .calendar-day { background: var(--bg-input); padding: 10px 5px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; min-height: 50px; display: flex; flex-direction: column; align-items: center;}
        .calendar-day:hover { border-color: var(--accent); background: var(--bg-hover); }
        .calendar-day.empty { background: transparent; cursor: default; }
        .calendar-day.today { background: rgba(59, 130, 246, 0.1); font-weight: bold; border: 1px solid var(--accent); }
        .day-number { font-size: 14px; }
        .day-expense { font-size: 11px; color: #f87171; margin-top: auto; font-weight: 600; }
        
        .calendar-notice { display: none; background: rgba(59, 130, 246, 0.1); color: var(--accent); padding: 10px; border-radius: 6px; text-align: center; font-size: 14px; margin-bottom: 15px; font-weight: 600;}
        .calendar-notice.active { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="mobile-overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <h2>ProTracker</h2>
    <div class="nav-item active" onclick="switchTab('home', this)">🏠 Home</div>
    <div class="nav-item" onclick="switchTab('history', this)">🕰️ Transaction History</div>
    <div class="nav-item" onclick="switchTab('calendar', this)">📅 Calendar</div>
</div>

<div class="main-content">
    <div class="mobile-header">
        <h2 style="margin:0; font-size:18px; color: var(--text-main);">ProTracker</h2>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    </div>
    
    <div class="scrollable-area">
        <div id="home" class="tab-content active">
            <div class="dashboard-grid">
                
                <div class="card">
                    <h2 class="card-title">📝 Record Expense</h2>
                    
                    <div id="calendar-override-notice" class="calendar-notice">
                        Adding expense for: <span id="override-date-text"></span>
                    </div>

                    <label>Amount (RM)</label>
                    <input type="number" id="exp-amount" placeholder="0.00" step="0.01">

                    <label>Category</label>
                    <div class="custom-select-wrapper">
                        <div class="custom-select" id="selected-category" onclick="toggleDropdown()">
                            <span id="cat-text">🍔 Food</span>
                            <span>▼</span>
                        </div>
                        <div class="custom-options" id="category-dropdown"></div>
                    </div>

                    <div class="flex-row">
                        <input type="text" id="new-category-name" placeholder="Type category (e.g. Coffee)" style="margin-bottom:0;">
                        <button style="width:auto; padding: 0 15px; background: var(--bg-hover);" onclick="addNewCategory()">+ Add</button>
                    </div>

                    <label>Note (Optional)</label>
                    <input type="text" id="exp-note" placeholder="e.g. foodpanda, Touch n' Go reload...">

                    <button onclick="addExpense()">Record Transaction</button>
                </div>

                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div class="card">
                        <h2 class="card-title">💡 Smart Suggestion</h2>
                        <div class="suggestion-box" id="suggestion-text"></div>
                    </div>
                    <div class="card">
                        <h2 class="card-title">📊 Monthly Overview</h2>
                        <div style="height: 200px; width: 100%;"><canvas id="expenseChart"></canvas></div>
                        <h3 style="text-align: center; margin-top: 15px;" id="total-spent-display">RM 0.00</h3>
                    </div>
                </div>
            </div>
        </div>

        <div id="history" class="tab-content">
            <div class="card" style="max-width: 800px; margin: 0 auto;">
                <h2 class="card-title">All Transactions</h2>
                <div id="history-list"></div>
            </div>
        </div>

        <div id="calendar" class="tab-content">
            <div class="card" style="max-width: 800px; margin: 0 auto;">
                <div class="calendar-header">
                    <button style="width: auto; padding: 5px 15px;" onclick="changeMonth(-1)">◀</button>
                    <h2 id="calendar-month-year" style="margin:0;">Month Year</h2>
                    <button style="width: auto; padding: 5px 15px;" onclick="changeMonth(1)">▶</button>
                </div>
                
                <div class="calendar-grid">
                    <div class="day-name">Sun</div><div class="day-name">Mon</div><div class="day-name">Tue</div>
                    <div class="day-name">Wed</div><div class="day-name">Thu</div><div class="day-name">Fri</div><div class="day-name">Sat</div>
                </div>
                <div class="calendar-grid" id="calendar-days"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // System Data
    let expenses = JSON.parse(localStorage.getItem('pro_exp_data')) || [];
    let categories = JSON.parse(localStorage.getItem('pro_cat_data')) || ['🍔 Food', '🚗 Transport', '🛍️ Shopping', '🧾 Bills'];
    
    // --- SMART DICTIONARY FOR EMOJIS ---
    const smartDictionary = {
        'coffee': '☕', 'cafe': '☕', 'starbucks': '☕', 'boba': '🧋', 'drink': '🥤',
        'medical': '🏥', 'hospital': '🏥', 'clinic': '🏥', 'doctor': '👨‍⚕️', 'medicine': '💊', 'pharmacy': '💊',
        'food': '🍔', 'restaurant': '🍽️', 'pizza': '🍕', 'kfc': '🍗', 'mcdonalds': '🍔',
        'transport': '🚗', 'grab': '🚗', 'petrol': '⛽', 'gas': '⛽', 'toll': '🛣️', 'parking': '🅿️',
        'shopping': '🛍️', 'clothes': '👕', 'shoes': '👟',
        'bills': '🧾', 'water': '💧', 'electricity': '⚡', 'internet': '🌐', 'phone': '📱',
        'entertainment': '🎮', 'movie': '🍿', 'cinema': '🍿', 'game': '🎮', 'steam': '🕹️',
        'groceries': '🛒', 'market': '🥬', 'supermarket': '🛒'
    };
    const defaultEmoji = '📌';

    let chartInstance = null;
    let currentCategory = categories[0];
    let currentDate = new Date(); 
    let customOverrideDate = null; // Used when clicking the calendar

    // Initialize App
    window.onload = function() {
        renderCategories();
        updateDashboard();
        renderCalendar();
    };

    // --- Mobile Sidebar Logic ---
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobile-overlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
    }

    // --- Tab Navigation ---
    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
        
        if(window.innerWidth <= 768) toggleSidebar();
        
        // If they leave home tab, clear the calendar override so it resets to "today"
        if(tabId !== 'home') {
            customOverrideDate = null;
            document.getElementById('calendar-override-notice').classList.remove('active');
        }
    }

    // --- Custom Dropdown Logic ---
    function toggleDropdown() { document.getElementById('category-dropdown').classList.toggle('show'); }
    window.onclick = function(event) { if (!event.target.closest('.custom-select-wrapper')) { document.getElementById('category-dropdown').classList.remove('show'); } }

    function renderCategories() {
        const dropdown = document.getElementById('category-dropdown');
        dropdown.innerHTML = '';
        categories.forEach((cat, index) => {
            const div = document.createElement('div');
            div.className = 'custom-option';
            const textSpan = document.createElement('span');
            textSpan.innerText = cat;
            textSpan.onclick = () => selectCategory(cat);
            div.appendChild(textSpan);
            if(categories.length > 1) {
                const delSpan = document.createElement('span');
                delSpan.innerText = '×';
                delSpan.className = 'del-cat-btn';
                delSpan.onclick = (e) => { e.stopPropagation(); deleteCategory(index); };
                div.appendChild(delSpan);
            }
            dropdown.appendChild(div);
        });
        if(!categories.includes(currentCategory)) currentCategory = categories[0];
        document.getElementById('cat-text').innerText = currentCategory;
    }
    function selectCategory(cat) { currentCategory = cat; document.getElementById('cat-text').innerText = cat; document.getElementById('category-dropdown').classList.remove('show'); }
    
    // --- SMART ADD CATEGORY LOGIC ---
    function addNewCategory() {
        const input = document.getElementById('new-category-name');
        let newCat = input.value.trim();
        
        if (newCat) {
            // Check dictionary for a match
            let foundEmoji = defaultEmoji;
            const searchWord = newCat.toLowerCase();
            
            for (const [keyword, emoji] of Object.entries(smartDictionary)) {
                if (searchWord.includes(keyword)) {
                    foundEmoji = emoji;
                    break; // Stop at first match
                }
            }
            
            // Combine them
            const formattedCategory = `${foundEmoji} ${newCat}`;

            if (!categories.includes(formattedCategory)) {
                categories.push(formattedCategory);
                localStorage.setItem('pro_cat_data', JSON.stringify(categories));
                renderCategories();
                selectCategory(formattedCategory);
            }
        }
        input.value = '';
    }
    
    function deleteCategory(index) { if(confirm("Delete this category?")) { categories.splice(index, 1); localStorage.setItem('pro_cat_data', JSON.stringify(categories)); renderCategories(); } }

    // --- Expense Logic ---
    function addExpense() {
        const amount = parseFloat(document.getElementById('exp-amount').value);
        const note = document.getElementById('exp-note').value || currentCategory.substring(currentCategory.indexOf(' ') + 1); // strip emoji from default note
        
        if (!amount || amount <= 0) return alert("Enter valid amount");

        // Determine the date (Use override if set, otherwise use right now)
        let timestamp;
        if (customOverrideDate) {
            timestamp = customOverrideDate;
        } else {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            timestamp = now.toISOString().slice(0, 16);
        }

        expenses.push({ id: Date.now(), amount, category: currentCategory, note, date: timestamp });
        localStorage.setItem('pro_exp_data', JSON.stringify(expenses));
        
        // Reset form
        document.getElementById('exp-amount').value = '';
        document.getElementById('exp-note').value = '';
        
        // Reset override back to normal
        customOverrideDate = null;
        document.getElementById('calendar-override-notice').classList.remove('active');
        
        updateDashboard();
        renderCalendar();
    }
    function deleteExpense(id) { expenses = expenses.filter(e => e.id !== id); localStorage.setItem('pro_exp_data', JSON.stringify(expenses)); updateDashboard(); renderCalendar(); }

    // --- Dashboard & Analytics ---
    function updateDashboard() {
        let total = 0; const catTotals = {};
        expenses.forEach(exp => { total += exp.amount; catTotals[exp.category] = (catTotals[exp.category] || 0) + exp.amount; });
        document.getElementById('total-spent-display').innerText = 'Total Spent: RM ' + total.toFixed(2);
        
        renderHistory(); renderChart(catTotals); generateSuggestion(catTotals, total);
    }

    function generateSuggestion(catTotals, totalSpent) {
        const box = document.getElementById('suggestion-text');
        if (expenses.length === 0) return box.innerHTML = "Add some expenses to see insights!";
        let maxCat = ''; let maxAmt = 0;
        for (const [cat, amt] of Object.entries(catTotals)) { if (amt > maxAmt) { maxAmt = amt; maxCat = cat; } }
        const pct = Math.round((maxAmt / totalSpent) * 100);
        box.innerHTML = `Your highest expense right now is <strong>${maxCat}</strong>, taking up <strong>${pct}%</strong> of your total spending (RM ${maxAmt.toFixed(2)}). <br><br> 💡 <em>Tip: Try to find one small way to reduce your ${maxCat} spending this week to boost your savings!</em>`;
    }

    // Group History by Date
    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        if(expenses.length === 0) return list.innerHTML = "<p style='color:var(--text-muted);'>No transactions yet.</p>";

        const sorted = [...expenses].sort((a, b) => new Date(b.date) - new Date(a.date));
        
        const grouped = {};
        sorted.forEach(exp => {
            const dateStr = new Date(exp.date).toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            if(!grouped[dateStr]) grouped[dateStr] = [];
            grouped[dateStr].push(exp);
        });

        for (const [date, items] of Object.entries(grouped)) {
            let html = `<div class="date-header">${date}</div>`;
            items.forEach(exp => {
                const timeStr = new Date(exp.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                html += `
                    <div class="expense-row">
                        <div>
                            <strong style="display:block; margin-bottom:4px;">${exp.note}</strong>
                            <span style="font-size:12px; color:var(--text-muted);">${exp.category} • ${timeStr}</span>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <span style="font-weight:bold; font-size:15px;">RM ${exp.amount.toFixed(2)}</span>
                            <button class="delete-btn" style="margin-left:15px;" onclick="deleteExpense(${exp.id})">✕</button>
                        </div>
                    </div>
                `;
            });
            list.innerHTML += html;
        }
    }

    function renderChart(catTotals) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        if (Object.keys(catTotals).length === 0) {
            chartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: ['Empty'], datasets: [{ data: [1], backgroundColor: ['#1f2937'], borderWidth:0 }] }, options: { plugins: { tooltip: {enabled:false} } } });
            return;
        }
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: Object.keys(catTotals), datasets: [{ data: Object.values(catTotals), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6'], borderWidth: 2, borderColor: '#151b2b' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: {color: '#9ca3af'} } } }
        });
    }

    // --- Calendar Logic ---
    function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }

    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        document.getElementById('calendar-month-year').innerText = new Date(year, month).toLocaleString('default', { month: 'long', year: 'numeric' });
        
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        const grid = document.getElementById('calendar-days');
        grid.innerHTML = '';
        const todayStr = new Date().toDateString();

        for (let i = 0; i < firstDay; i++) { grid.innerHTML += `<div class="calendar-day empty"></div>`; }

        for (let i = 1; i <= daysInMonth; i++) {
            const thisDayDate = new Date(year, month, i);
            const thisDayStr = thisDayDate.toDateString();
            
            const dayExpenses = expenses.filter(e => new Date(e.date).toDateString() === thisDayStr);
            const dayTotal = dayExpenses.reduce((sum, exp) => sum + exp.amount, 0);

            let classes = 'calendar-day';
            if (thisDayStr === todayStr) classes += ' today';

            const div = document.createElement('div');
            div.className = classes;
            
            let innerHTML = `<span class="day-number">${i}</span>`;
            if (dayTotal > 0) innerHTML += `<span class="day-expense">RM ${dayTotal.toFixed(0)}</span>`;
            
            div.innerHTML = innerHTML;
            
            // Handle clicking a day on the calendar
            div.onclick = () => {
                // Generate a timestamp for noon on that specific day
                customOverrideDate = new Date(year, month, i, 12, 0).toISOString().slice(0, 16);
                
                // Show the blue banner on the home screen
                document.getElementById('override-date-text').innerText = thisDayDate.toLocaleDateString([], { month: 'long', day: 'numeric', year: 'numeric' });
                document.getElementById('calendar-override-notice').classList.add('active');
                
                // Jump to home tab
                switchTab('home', document.querySelectorAll('.nav-item')[0]); 
            };
            grid.appendChild(div);
        }
    }
</script>
</body>
</html>
